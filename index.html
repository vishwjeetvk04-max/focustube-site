<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      background: #00e5ff;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ff99;
      transform: scale(1.05);
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🚀 My App Download</h1>
    <p>Click below to download latest APK version</p>

    <!-- DOWNLOAD BUTTON -->
    <a class="btn" href="app-release-signed.apk" download>
      ⬇ Download APK
    </a>

    <div class="small">
      Secure download via GitHub Pages
    </div>
  </div>

</body>
</html>
